name: driver
description: A new Flutter application.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.4
  # intl: ^0.19.0
  intl: ^0.20.2
  percent_indicator: ^4.0.0
  flutter_phoenix: ^1.0.0
  flutter_bloc: ^9.1.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  flutter_local_notifications: ^19.0.0
  firebase_messaging: ^15.0.0
  cached_network_image: ^3.0.0
  toast: ^0.3.0
  image_picker: ^1.1.2
  shimmer_animation: ^2.0.0
  flutter_html: ^3.0.0-beta.2
  whatsapp_unilink: ^2.0.1+1
  url_launcher: ^6.0.20
  infinite_scroll_pagination: ^5.0.0
  signature: ^6.0.0
  location: ^8.0.0
  dio: ^5.4.3+1
  path_provider: ^2.0.9
  geolocator: ^14.0.0
  flutter_background_service: ^5.1.0
  google_maps_flutter: ^2.5.0
  http: ^1.3.0
  shared_preferences: ^2.2.2 
  permission_handler: ^12.0.0+1
  wakelock_plus: ^1.2.8
  firebase_analytics: ^11.0.0
  connectivity_plus_platform_interface: ^2.0.0
  json_annotation: ^4.5.0
  flutter_polyline_points: ^2.1.0
  package_info_plus: ^8.0.2
  fluttertoast: ^8.2.12
  win32: ^5.5.4
  flutter_image_compress: ^2.0.0
  carousel_slider: ^5.0.0
  audioplayers: ^6.6.0

dependency_overrides:
  platform: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  change_app_package_name: ^1.0.0

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/splash_screen.png"

flutter:
  uses-material-design: true
  fonts:
#    - family: ProductSans
#      fonts:
#        - asset: fonts/ProductSans-Regular.ttf
#        - asset: fonts/ProductSans-Bold.ttf
    - family: Poppins
      fonts:
            - asset: fonts/Poppins-Regular.ttf
            - asset: fonts/Poppins-Bold.ttf
  assets:
    - assets/
    - assets/store.png
    - assets/customer.png
    - assets/driver.png
    - assets/audio/